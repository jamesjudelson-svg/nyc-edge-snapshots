name: NYC Edge Snapshots
on:
  schedule:
    # 1AM EDT (05:00 UTC) — snapshot + score yesterday (CLI retry) + 1AM DSM
    - cron: '0 5 * * *'
    # 7:10AM EDT (11:10 UTC) — DSM check
    - cron: '10 11 * * *'
    # 1:10PM EDT (17:10 UTC) — DSM check
    - cron: '10 17 * * *'
    # 4:10PM EDT (20:10 UTC) — DSM check
    - cron: '10 20 * * *'
    # 7:10PM EDT (23:10 UTC) — DSM check
    - cron: '10 23 * * *'
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Job type override (snapshot, dsm, score_only)'
        required: false
        default: ''
jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run capture script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          JOB_TYPE: ${{ github.event.inputs.job_type }}
        run: node capture.js
