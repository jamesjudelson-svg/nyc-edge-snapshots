name: NYC Edge Snapshots
on:
  schedule:
    # 1AM EDT (05:00 UTC) — snapshot
    - cron: '0 5 * * *'
    # 3AM EDT (07:00 UTC) — score yesterday via CLI
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Job type override: snapshot or score'
        required: false
        default: ''
jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run capture script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          JOB_TYPE: ${{ github.event.inputs.job_type }}
        run: node capture.js
